<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İthaki Bilimkurgu Klasikleri Listesi</title>
    <meta name="description" content="İthaki Bilimkurgu Klasikleri listem — Google Sheets ile senkronize">
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #f7f3ea;
            --surface: transparent;
            --border: #dcd1be;
            --border-hover: #c4b59c;
            --accent: #8c3a26;
            --text: #2d241c;
            --muted: #8b7d6a;
            --read: #335e45;
            --unread: #a09786;
            --gold: #b46b1a;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .page { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 40px 20px 80px; }

        /* ── Header ── */
        header { text-align: center; padding: 60px 0 50px; border-bottom: 1px solid var(--border); margin-bottom: 30px; }

        .header-label {
            display: inline-block;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 20px;
            font-family: 'Outfit', sans-serif;
        }

        h1 {
            font-family: 'Lora', serif;
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 400;
            line-height: 1.15;
            margin-bottom: 14px;
            color: var(--text);
            letter-spacing: -0.01em;
        }

        .subtitle {
            color: var(--muted);
            font-size: 1rem;
            font-weight: 400;
            margin-bottom: 32px;
        }

        /* ── Stats ── */
        .stats { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; margin-bottom: 0; }

        .stat {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: var(--text);
        }

        .stat strong { color: var(--text); font-weight: 600; }

        /* ── Search ── */
        .search-wrap { position: relative; max-width: 520px; margin: 40px auto; }

        .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: 1rem;
            pointer-events: none;
        }

        #searchInput {
            width: 100%;
            padding: 12px 0 12px 40px;
            border: none;
            border-bottom: 1px solid var(--border-hover);
            background: transparent;
            color: var(--text);
            font-size: 1.1rem;
            font-family: 'Lora', serif;
            font-style: italic;
            transition: border-color 0.3s;
        }

        #searchInput::placeholder { color: var(--muted); }
        #searchInput:focus { outline: none; border-color: var(--accent); }

        /* ── Loader ── */
        #loader { text-align: center; padding: 80px 20px; }

        .spinner {
            width: 44px; height: 44px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loader-text { color: var(--muted); font-size: 0.95rem; }

        /* ── List Layout (Catalog Style) ── */
        .list-container {
            display: flex;
            flex-direction: column;
        }

        /* ── Catalog Row ── */
        .list-item {
            padding: 18px 0;
            display: flex;
            align-items: baseline;
            gap: 20px;
            border-bottom: 1px solid var(--border);
            transition: background 0.2s ease;
        }

        .list-item:hover {
            background: rgba(0,0,0,0.02);
            border-bottom-color: var(--border-hover);
        }

        /* Number */
        .num {
            font-size: 1rem;
            color: var(--muted);
            min-width: 40px;
            font-family: 'Outfit', sans-serif;
            text-align: right;
        }

        /* Main Info */
        .item-main {
            flex-grow: 1;
            display: flex;
            align-items: baseline;
            gap: 12px;
            flex-wrap: wrap;
        }

        /* Title */
        .book-title {
            font-family: 'Lora', serif;
            font-size: 1.25rem;
            font-weight: 500;
            color: var(--text);
        }

        /* Author */
        .author {
            font-size: 0.95rem;
            color: var(--muted);
            font-weight: 400;
            font-family: 'Lora', serif;
            font-style: italic;
        }

        /* Dates */
        .dates {
            font-size: 0.8rem;
            color: var(--muted);
            font-family: 'Outfit', sans-serif;
            margin-top: 2px;
            letter-spacing: 0.02em;
        }
        .date-sep { opacity: 0.5; margin: 0 4px; }

        /* Meta Info */
        .item-meta {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        /* Tags */
        .tags { display: flex; gap: 12px; }

        .tag {
            font-size: 0.8rem;
            font-family: 'Outfit', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .tag-read { color: var(--read); }
        .tag-unread { color: var(--unread); }
        .tag-owned { color: var(--gold); }

        /* Stars */
        .stars { font-size: 0.9rem; letter-spacing: 2px; color: var(--gold); }

        /* ── Mobile ── */
        @media (max-width: 600px) {
            header { padding: 40px 0 30px; }
            h1 { font-size: 2rem; }
            .list-item {
                flex-direction: column;
                gap: 8px;
                padding: 16px 10px;
                align-items: flex-start;
            }
            .num { text-align: left; }
            .item-meta {
                width: 100%;
                justify-content: space-between;
                margin-top: 4px;
            }
            .book-title { font-size: 1.15rem; }
        }

        @media (max-width: 400px) {
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

<div class="page">

    <header>
        <div class="header-label">📚 Kişisel Koleksiyon</div>
        <h1>İthaki Bilimkurgu<br>Klasikleri Listesi</h1>
        <p class="subtitle">Google Sheets ile senkronize · canlı liste</p>
        <div class="stats" id="stats"></div>
    </header>

    <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Kitap veya yazar ara…">
    </div>

    <div id="loader">
        <div class="spinner"></div>
        <p class="loader-text">Liste yükleniyor…</p>
    </div>

    <div class="list-container" id="grid"></div>

</div>

<script>
    const SHEET_ID = '16X3KyJtwW5uO3fzco0XxaWBzkNYvDBfSDEymGn-MYQo';
    let allBooks = [];

    window.sheetsCallback = function(data) {
        try {
            document.getElementById('loader').style.display = 'none';
            const cols = data.table.cols.map(c => c.label);
            allBooks = data.table.rows
                .filter(row => row !== null)
                .map(row => {
                    const obj = {};
                    cols.forEach((col, i) => {
                        const cell = (row.c && row.c[i]) ? row.c[i] : null;
                        let val = '';
                        if (cell && cell.f != null) val = String(cell.f);
                        else if (cell && cell.v != null) val = String(cell.v);

                        // Checkbox sütunları TRUE/true/Evet → 'Evet' olarak normalize et
                        if (col === 'okundu' || col === 'kitaplikta_var') {
                            obj[col] = (val === 'TRUE' || val === 'true' || val === 'Evet') ? 'Evet' : '';
                        } else {
                            obj[col] = val;
                        }
                    });
                    return obj;
                })
                .filter(b => b.kitap_adi && b.kitap_adi.trim());

            render(allBooks);
            renderStats(allBooks);
        } catch(e) {
            document.getElementById('loader').innerHTML = '<p style="color:#ef4444">⚠️ Hata: ' + e.message + '</p>';
        }
    };

    function fetchData() {
        const s = document.createElement('script');
        s.onerror = () => {
            document.getElementById('loader').innerHTML = '<p style="color:#ef4444">⚠️ Veri yüklenemedi. İnternet bağlantınızı kontrol edin.</p>';
        };
        s.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=responseHandler:sheetsCallback`;
        document.body.appendChild(s);
    }

    function render(books) {
        const grid = document.getElementById('grid');
        if (!books.length) {
            grid.innerHTML = '<p style="color:var(--muted);text-align:center;padding:40px">Kitap bulunamadı.</p>';
            return;
        }
        grid.innerHTML = books.map(b => {
            const isRead  = b.okundu === 'Evet';
            const isOwned = b.kitaplikta_var === 'Evet';
            const rating  = parseInt(b.puan) || 0;
            const stars   = rating ? '★'.repeat(rating) + '☆'.repeat(5 - rating) : '';
            const no      = b.sira_no || '';
            const title   = b.kitap_adi || '—';
            const author  = b.yazar_adi || '—';
            const dateStart = b.tarih_1 ? b.tarih_1 : '';
            const dateEnd   = b.tarih_2 ? b.tarih_2 : '';
            
            let dateHtml = '';
            if (dateStart || dateEnd) {
                // Remove timestamp if Google Sheets sends dates like "Date(2023, 10, 1)"
                // But normally the fetch query formats it, so we can just display it.
                dateHtml = `<div class="dates">
                    ${dateStart ? `<span>Başlama: ${dateStart}</span>` : ''}
                    ${dateStart && dateEnd ? '<span class="date-sep">|</span>' : ''}
                    ${dateEnd ? `<span>Bitiş: ${dateEnd}</span>` : ''}
                </div>`;
            }

            return `
            <div class="list-item">
                <div class="num">#${no}</div>
                <div class="item-main">
                    <div class="book-title">${title}</div>
                    <div class="author">${author}</div>
                    ${dateHtml}
                </div>
                <div class="item-meta">
                    ${stars ? `<div class="stars">${stars}</div>` : ''}
                    <div class="tags">
                        <span class="tag ${isRead ? 'tag-read' : 'tag-unread'}">${isRead ? '✓ Okundu' : '⌛ Okunacak'}</span>
                        ${isOwned ? '<span class="tag tag-owned">📚 Kitaplıkta</span>' : ''}
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    function renderStats(books) {
        const total = books.length;
        const read  = books.filter(b => b.okundu === 'Evet').length;
        const owned = books.filter(b => b.kitaplikta_var === 'Evet').length;
        document.getElementById('stats').innerHTML = `
            <div class="stat">📖 Toplam <strong>${total}</strong> Kitap</div>
            <div class="stat">✅ Okunan <strong>${read}</strong></div>
            <div class="stat">🏠 Kitaplıkta <strong>${owned}</strong></div>`;
    }

    document.getElementById('searchInput').addEventListener('input', e => {
        const t = e.target.value.toLowerCase();
        render(allBooks.filter(b =>
            b.kitap_adi.toLowerCase().includes(t) ||
            b.yazar_adi.toLowerCase().includes(t)
        ));
    });

    fetchData();
</script>
</body>
</html>
