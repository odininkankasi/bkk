<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İthaki Bilimkurgu Klasikleri Listesi</title>
    <meta name="description" content="İthaki Bilimkurgu Klasikleri listem — Google Sheets ile senkronize">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #080c14;
            --surface: rgba(255,255,255,0.04);
            --surface-hover: rgba(255,255,255,0.08);
            --border: rgba(255,255,255,0.08);
            --border-hover: rgba(255,255,255,0.18);
            --gold: #f0a500;
            --gold-soft: #fbbf24;
            --purple: #7c3aed;
            --text: #f1f5f9;
            --muted: #64748b;
            --read: #10b981;
            --unread: #6366f1;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Background glow ── */
        body::before {
            content: '';
            position: fixed;
            top: -30%;
            left: 50%;
            transform: translateX(-50%);
            width: 900px;
            height: 500px;
            background: radial-gradient(ellipse, rgba(124,58,237,0.15) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .page { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 40px 20px 80px; }

        /* ── Header ── */
        header { text-align: center; padding: 60px 0 50px; }

        .header-label {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--gold);
            border: 1px solid rgba(240,165,0,0.3);
            padding: 5px 14px;
            border-radius: 20px;
            margin-bottom: 20px;
            background: rgba(240,165,0,0.05);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 14px;
            background: linear-gradient(135deg, #f1f5f9 30%, #f0a500 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: var(--muted);
            font-size: 1rem;
            font-weight: 400;
            margin-bottom: 32px;
        }

        /* ── Stats ── */
        .stats { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; margin-bottom: 0; }

        .stat {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px 18px;
            font-size: 0.85rem;
            color: var(--muted);
            backdrop-filter: blur(12px);
        }

        .stat strong { color: var(--text); font-weight: 600; }

        /* ── Search ── */
        .search-wrap { position: relative; max-width: 520px; margin: 40px auto; }

        .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: 1rem;
            pointer-events: none;
        }

        #searchInput {
            width: 100%;
            padding: 15px 20px 15px 46px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.3s, background 0.3s;
            backdrop-filter: blur(12px);
        }

        #searchInput::placeholder { color: var(--muted); }
        #searchInput:focus { outline: none; border-color: rgba(240,165,0,0.5); background: var(--surface-hover); }

        /* ── Loader ── */
        #loader { text-align: center; padding: 80px 20px; }

        .spinner {
            width: 44px; height: 44px;
            border: 3px solid rgba(255,255,255,0.07);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loader-text { color: var(--muted); font-size: 0.95rem; }

        /* ── Grid ── */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 16px;
        }

        /* ── Card ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            cursor: default;
            transition: transform 0.25s ease, border-color 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
        }

        .cover-wrap {
            width: 100%;
            height: 340px;
            background: rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
            border-bottom: 1px solid var(--border);
        }

        .cover-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .card:hover .cover-img {
            transform: scale(1.05);
        }

        .card-content {
            padding: 22px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(240,165,0,0.06) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: var(--border-hover);
            background: var(--surface-hover);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(240,165,0,0.08);
        }

        .card:hover::before { opacity: 1; }

        /* Number */
        .num {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 0.1em;
            margin-bottom: 10px;
            opacity: 0.7;
        }

        /* Title */
        .book-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.05rem;
            font-weight: 700;
            line-height: 1.35;
            color: var(--text);
            margin-bottom: 6px;
        }

        /* Author */
        .author {
            font-size: 0.82rem;
            color: var(--muted);
            font-weight: 400;
            margin-bottom: 16px;
        }

        /* Divider */
        .card-divider {
            height: 1px;
            background: var(--border);
            margin-bottom: 14px;
        }

        /* Tags */
        .tags { display: flex; gap: 7px; flex-wrap: wrap; align-items: center; }

        .tag {
            font-size: 0.72rem;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 20px;
            letter-spacing: 0.03em;
        }

        .tag-read { background: rgba(16,185,129,0.12); color: var(--read); border: 1px solid rgba(16,185,129,0.2); }
        .tag-unread { background: rgba(99,102,241,0.12); color: #818cf8; border: 1px solid rgba(99,102,241,0.2); }
        .tag-owned { background: rgba(240,165,0,0.1); color: var(--gold-soft); border: 1px solid rgba(240,165,0,0.2); }

        /* Stars */
        .stars { margin-bottom: 10px; font-size: 0.85rem; letter-spacing: 2px; color: var(--gold); }

        /* ── Mobile ── */
        @media (max-width: 600px) {
            header { padding: 40px 0 36px; }
            h1 { font-size: 2.2rem; }
            .grid { grid-template-columns: 1fr; gap: 16px; }
            .card-content { padding: 20px; }
            .cover-wrap { height: 400px; }
            .book-title { font-size: 1.15rem; }
            .author { font-size: 0.95rem; }
            .stat { font-size: 0.9rem; padding: 8px 14px; }
            .tag { font-size: 0.8rem; padding: 4px 12px; }
        }

        @media (max-width: 400px) {
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

<div class="page">

    <header>
        <div class="header-label">📚 Kişisel Koleksiyon</div>
        <h1>İthaki Bilimkurgu<br>Klasikleri Listesi</h1>
        <p class="subtitle">Google Sheets ile senkronize · canlı liste</p>
        <div class="stats" id="stats"></div>
    </header>

    <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Kitap veya yazar ara…">
    </div>

    <div id="loader">
        <div class="spinner"></div>
        <p class="loader-text">Liste yükleniyor…</p>
    </div>

    <div class="grid" id="grid"></div>

</div>

<script>
    const SHEET_ID = '16X3KyJtwW5uO3fzco0XxaWBzkNYvDBfSDEymGn-MYQo';
    let allBooks = [];

    window.sheetsCallback = function(data) {
        try {
            document.getElementById('loader').style.display = 'none';
            const cols = data.table.cols.map(c => c.label);
            allBooks = data.table.rows
                .filter(row => row !== null)
                .map(row => {
                    const obj = {};
                    cols.forEach((col, i) => {
                        const cell = (row.c && row.c[i]) ? row.c[i] : null;
                        let val = '';
                        if (cell && cell.f != null) val = String(cell.f);
                        else if (cell && cell.v != null) val = String(cell.v);

                        // Checkbox sütunları TRUE/true/Evet → 'Evet' olarak normalize et
                        if (col === 'okundu' || col === 'kitaplikta_var') {
                            obj[col] = (val === 'TRUE' || val === 'true' || val === 'Evet') ? 'Evet' : '';
                        } else {
                            obj[col] = val;
                        }
                    });
                    return obj;
                })
                .filter(b => b.kitap_adi && b.kitap_adi.trim());

            render(allBooks);
            renderStats(allBooks);
        } catch(e) {
            document.getElementById('loader').innerHTML = '<p style="color:#ef4444">⚠️ Hata: ' + e.message + '</p>';
        }
    };

    function fetchData() {
        const s = document.createElement('script');
        s.onerror = () => {
            document.getElementById('loader').innerHTML = '<p style="color:#ef4444">⚠️ Veri yüklenemedi. İnternet bağlantınızı kontrol edin.</p>';
        };
        s.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=responseHandler:sheetsCallback`;
        document.body.appendChild(s);
    }

    function render(books) {
        const grid = document.getElementById('grid');
        if (!books.length) {
            grid.innerHTML = '<p style="color:var(--muted);grid-column:1/-1;text-align:center;padding:40px">Kitap bulunamadı.</p>';
            return;
        }
        grid.innerHTML = books.map(b => {
            const isRead  = b.okundu === 'Evet';
            const isOwned = b.kitaplikta_var === 'Evet';
            const rating  = parseInt(b.puan) || 0;
            const stars   = rating ? '★'.repeat(rating) + '☆'.repeat(5 - rating) : '';
            const no      = b.sira_no || '';
            const title   = b.kitap_adi || '—';
            const author  = b.yazar_adi || '—';
            const cover   = b.kapak || b.kapak_linki || b.resim || b.kapak_gorseli || '';
            const coverHtml = cover ? `<div class="cover-wrap"><img src="${cover}" alt="${title} kapağı" class="cover-img" loading="lazy"></div>` : `<div class="cover-wrap" style="display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:0.85rem;">Kapak Yok</div>`;
            return `
            <div class="card">
                ${coverHtml}
                <div class="card-content">
                    <div class="num">#${no}</div>
                    <div class="book-title">${title}</div>
                    <div class="author">${author}</div>
                    ${stars ? `<div class="stars">${stars}</div>` : ''}
                    <div style="flex-grow:1"></div>
                    <div class="card-divider"></div>
                    <div class="tags">
                        <span class="tag ${isRead ? 'tag-read' : 'tag-unread'}">${isRead ? '✓ Okundu' : '⌛ Okunacak'}</span>
                        ${isOwned ? '<span class="tag tag-owned">📚 Kitaplıkta</span>' : ''}
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    function renderStats(books) {
        const total = books.length;
        const read  = books.filter(b => b.okundu === 'Evet').length;
        const owned = books.filter(b => b.kitaplikta_var === 'Evet').length;
        document.getElementById('stats').innerHTML = `
            <div class="stat">📖 Toplam <strong>${total}</strong> Kitap</div>
            <div class="stat">✅ Okunan <strong>${read}</strong></div>
            <div class="stat">🏠 Kitaplıkta <strong>${owned}</strong></div>`;
    }

    document.getElementById('searchInput').addEventListener('input', e => {
        const t = e.target.value.toLowerCase();
        render(allBooks.filter(b =>
            b.kitap_adi.toLowerCase().includes(t) ||
            b.yazar_adi.toLowerCase().includes(t)
        ));
    });

    fetchData();
</script>
</body>
</html>
