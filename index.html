<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitaplığım</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            /* Slate 900 */
            --card-bg: #1e293b;
            /* Slate 800 */
            --text-main: #f8fafc;
            /* Slate 50 */
            --text-muted: #94a3b8;
            /* Slate 400 */
            --accent: #3b82f6;
            /* Blue 500 */
            --accent-hover: #2563eb;
            /* Blue 600 */
            --success: #10b981;
            --warning: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 40px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .stat-badge {
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #loader {
            text-align: center;
            padding: 50px;
            font-size: 1.2rem;
            color: var(--text-muted);
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border-left-color: var(--accent);
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .sira-no {
            font-size: 3rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.03);
            position: absolute;
            top: -10px;
            right: 10px;
            pointer-events: none;
        }

        .book-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 8px;
            z-index: 1;
        }

        .author {
            color: var(--accent);
            font-size: 0.95rem;
            font-weight: 400;
            margin-bottom: 16px;
            z-index: 1;
        }

        .tags {
            display: flex;
            gap: 8px;
            margin-top: auto;
            flex-wrap: wrap;
        }

        .tag {
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: 600;
        }

        .tag-read {
            background-color: rgba(16, 185, 129, 0.1);
            color: var(--success);
        }

        .tag-unread {
            background-color: rgba(245, 158, 11, 0.1);
            color: var(--warning);
        }

        .tag-owned {
            background-color: rgba(59, 130, 246, 0.1);
            color: var(--accent);
        }

        .rating {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-top: 12px;
            color: #fbbf24;
            font-size: 0.9rem;
        }

        .search-bar {
            width: 100%;
            max-width: 500px;
            margin: 0 auto 40px;
            display: block;
            padding: 16px 24px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.03);
            color: white;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .search-bar:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.05);
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2rem;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            body {
                padding: 10px;
            }

            .card {
                padding: 20px;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <h1>Bilimkurgu Kitaplığım</h1>
            <div class="subtitle">Google Sheets ile senkronize canlı liste</div>
            <div class="stats" id="stats-container">
                <!-- Stats will be injected here -->
            </div>
        </header>

        <input type="text" id="searchInput" class="search-bar" placeholder="Kitap veya yazar ara...">

        <div id="loader">
            <div class="spinner"></div>
            Veriler yükleniyor...
        </div>

        <div class="grid" id="books-grid">
            <!-- Cards will be injected here -->
        </div>
        <script>
        const SHEET_ID = '16X3KyJtwW5uO3fzco0XxaWBzkNYvDBfSDEymGn-MYQo';
        let allBooks = [];

        // Google Sheets gviz/tq - JSONP ile veri çekme
        // Önce global callback fonksiyonunu tanımla, sonra script tag ekle
        window.sheetsCallback = function(data) {
            try {
                document.getElementById('loader').style.display = 'none';

                const cols = data.table.cols.map(c => c.label);
                allBooks = data.table.rows
                    .filter(row => row !== null)
                    .map(row => {
                        const obj = {};
                        cols.forEach((col, i) => {
                            const cell = (row.c && row.c[i]) ? row.c[i] : null;
                            if (cell !== null && cell.f !== undefined && cell.f !== null) {
                                obj[col] = String(cell.f);
                            } else if (cell !== null && cell.v !== undefined && cell.v !== null) {
                                obj[col] = String(cell.v);
                            } else {
                                obj[col] = '';
                            }
                        });
                        return obj;
                    })
                    .filter(b => b['kitap_adi'] && b['kitap_adi'].trim() !== '');

                renderBooks(allBooks);
                updateStats(allBooks);
            } catch(e) {
                document.getElementById('loader').innerHTML = '⚠️ Veri işlenirken hata: ' + e.message;
                console.error(e);
            }
        };

        function fetchData() {
            const script = document.createElement('script');
            script.onerror = function() {
                document.getElementById('loader').innerHTML = '⚠️ Veri yüklenemedi. İnternet bağlantınızı kontrol edin.';
            };
            // DÜZELTME: tqx parametresi içinde responseHandler kullanıyoruz
            script.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=responseHandler:sheetsCallback`;
            document.body.appendChild(script);
        }

        function renderBooks(books) {
            const grid = document.getElementById('books-grid');
            grid.innerHTML = '';

            if (books.length === 0) {
                grid.innerHTML = '<p style="color: var(--text-muted); text-align:center; grid-column:1/-1;">Kitap bulunamadı.</p>';
                return;
            }

            books.forEach(book => {
                const card = document.createElement('div');
                card.className = 'card';

                const title = book['kitap_adi'] || 'İsimsiz Kitap';
                const author = book['yazar_adi'] || 'Bilinmeyen Yazar';
                const isRead = book['okundu'] === 'Evet';
                const isOwned = book['kitaplikta_var'] === 'Evet';
                const rating = parseInt(book['puan']) || 0;
                const no = book['sira_no'] || '';

                let stars = '';
                if (rating > 0) {
                    stars = '★'.repeat(rating) + '☆'.repeat(5 - rating);
                }

                card.innerHTML = `
                    <div class="sira-no">${no}</div>
                    <div class="book-title">${title}</div>
                    <div class="author">${author}</div>
                    ${rating > 0 ? `<div class="rating">${stars}</div>` : ''}
                    <div class="tags">
                        <span class="tag ${isRead ? 'tag-read' : 'tag-unread'}">
                            ${isRead ? '✓ Okundu' : '⌛ Okunacak'}
                        </span>
                        ${isOwned ? '<span class="tag tag-owned">📚 Kitaplıkta</span>' : ''}
                    </div>
                `;

                grid.appendChild(card);
            });
        }

        function updateStats(books) {
            const statsContainer = document.getElementById('stats-container');
            const total = books.length;
            const read = books.filter(b => b['okundu'] === 'Evet').length;
            const owned = books.filter(b => b['kitaplikta_var'] === 'Evet').length;

            statsContainer.innerHTML = `
                <div class="stat-badge">Toplam: <strong>${total}</strong> Kitap</div>
                <div class="stat-badge">Okunan: <strong>${read}</strong> Kitap</div>
                <div class="stat-badge">Kitaplıkta: <strong>${owned}</strong> Kitap</div>
            `;
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allBooks.filter(book =>
                (book['kitap_adi'] || '').toLowerCase().includes(term) ||
                (book['yazar_adi'] || '').toLowerCase().includes(term)
            );
            renderBooks(filtered);
        });

        fetchData();

    </script>
</body>

</html>
